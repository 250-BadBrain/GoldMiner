<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工 - 闯关版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="info-bar">
                <div class="info-item">第 <span id="levelDisplay">1</span> 关</div>
                <div class="info-item">目标: <span id="targetDisplay">1000</span></div>
                <div class="info-item" style="color: #ffcc00;">得分: <span id="scoreDisplay">0</span></div>
                <div class="info-item" style="color: #ff4444;">时间: <span id="timeDisplay">60</span>s</div>
                <div class="info-item">炸弹: <span id="bombDisplay">3</span></div>
            </div>
            <div class="hint">【空格】出钩 | 【E/↑】炸弹</div>
        </div>
        
        <div style="position: relative;">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
            
            <div id="overlay" class="overlay" style="display: none;">
                <h1 id="overlayTitle">恭喜过关！</h1>
                <p id="overlayText">准备进入下一关...</p>
                <button onclick="startNextLevel()" id="nextBtn">开始下一关</button>
                <button onclick="resetGame()" id="restartBtn" style="display:none;">重新开始</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
